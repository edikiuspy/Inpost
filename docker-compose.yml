services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: inpost-backend
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - backend-cache:/srv/backend/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: inpost-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend-cache:
